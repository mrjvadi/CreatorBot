version: "3.9"
services:
  apimanager:
    build:
      context: ../..
      dockerfile: apimanager/deploy/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports: ["${API_PORT:-8080}:${API_PORT:-8080}"]
    depends_on: [postgres, centrifugo]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: botmanager
      POSTGRES_USER: botmanager
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes: [pg_data:/var/lib/postgresql/data]

  centrifugo:
    image: centrifugo/centrifugo:v5
    restart: unless-stopped
    environment:
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_ALLOWED_ORIGINS: "*"
    ports: ["8000:8000"]
    volumes: [centrifugo_data:/centrifugo]

volumes: {pg_data: {}, centrifugo_data: {}}
