version: "3.9"

services:

  # ── Infrastructure ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: creatorbot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/migrations:/docker-entrypoint-initdb.d
    ports:
      # فقط برای دسترسی local (دیباگ) — در production این خط را کامل حذف کنید
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d creatorbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: creatorbot
    volumes:
      - mongo_data:/data/db
    ports:
      # فقط برای دسترسی local (دیباگ) — در production این خط را کامل حذف کنید
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' mongodb://mongouser:${MONGO_PASSWORD}@localhost:27017/admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: >
      -js
      --user ${NATS_USERNAME}
      --pass ${NATS_PASSWORD}
      --http_port 8222
    ports:
      - "4222:4222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core Services ──────────────────────────────────────
  botmanager:
    build:
      context: .
      dockerfile: botmanager/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      nats:     {condition: service_healthy}
    env_file: botmanager/.env
    environment:
      POSTGRES_DSN: postgres://botuser:${POSTGRES_PASSWORD}@postgres:5432/creatorbot?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
      NATS_USERNAME: ${NATS_USERNAME}
      NATS_PASSWORD: ${NATS_PASSWORD}

  apimanager:
    build:
      context: .
      dockerfile: apimanager/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      nats:     {condition: service_healthy}
    env_file: apimanager/.env
    environment:
      POSTGRES_DSN: postgres://botuser:${POSTGRES_PASSWORD}@postgres:5432/creatorbot?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222

  botpay:
    build:
      context: .
      dockerfile: botpay/Dockerfile
    restart: unless-stopped
    ports:
      - "8087:8087"
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    env_file: botpay/.env
    environment:
      POSTGRES_DSN: postgres://botuser:${POSTGRES_PASSWORD}@postgres:5432/creatorbot?sslmode=disable
      NATS_URL: nats://nats:4222
      NATS_USERNAME: ${NATS_USERNAME}
      NATS_PASSWORD: ${NATS_PASSWORD}
    volumes:
      - botpay_data:/app/data

  # docker-socket-proxy: agentmanager فقط از طریق این پروکسی به docker.sock
  # دسترسی دارد — فقط endpointهای لازم (CONTAINERS, IMAGES) باز هستند؛
  # endpointهای حساس (مثلا EXEC, SWARM, PLUGINS) بسته می‌مانند تا
  # compromise شدن agentmanager به root-equivalent روی host تبدیل نشود.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      EXEC: 0
      SWARM: 0
      PLUGINS: 0
      SYSTEM: 0
      NETWORKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  agentmanager:
    build:
      context: .
      dockerfile: agentmanager/Dockerfile
    restart: unless-stopped
    depends_on:
      nats: {condition: service_healthy}
      docker-socket-proxy: {condition: service_started}
    env_file: agentmanager/.env
    environment:
      NATS_URL: nats://nats:4222
      NATS_USERNAME: ${NATS_USERNAME}
      NATS_PASSWORD: ${NATS_PASSWORD}
      DOCKER_HOST: tcp://docker-socket-proxy:2375

  webhook-gateway:
    build:
      context: .
      dockerfile: webhook-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"
    depends_on:
      nats: {condition: service_healthy}
    env_file: webhook-gateway/.env
    environment:
      NATS_URL: nats://nats:4222

  # ── Analytics & Monetization ───────────────────────────
  revenue-service:
    build:
      context: .
      dockerfile: revenue-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8088:8088"
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    env_file: revenue-service/.env
    environment:
      POSTGRES_DSN: postgres://botuser:${POSTGRES_PASSWORD}@postgres:5432/creatorbot?sslmode=disable
      NATS_URL: nats://nats:4222

  community-service:
    build:
      context: .
      dockerfile: community-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8093:8093"
    depends_on:
      postgres: {condition: service_healthy}
      mongo:    {condition: service_healthy}
      nats:     {condition: service_healthy}
    env_file: community-service/.env
    environment:
      POSTGRES_DSN: postgres://botuser:${POSTGRES_PASSWORD}@postgres:5432/creatorbot?sslmode=disable
      MONGO_URI: mongodb://mongouser:${MONGO_PASSWORD}@mongo:27017/creatorbot?authSource=admin
      NATS_URL: nats://nats:4222

  fraud-engine:
    build:
      context: .
      dockerfile: fraud-engine/Dockerfile
    restart: unless-stopped
    ports:
      - "8092:8092"
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      nats:     {condition: service_healthy}
    env_file: fraud-engine/.env
    environment:
      POSTGRES_DSN: postgres://botuser:${POSTGRES_PASSWORD}@postgres:5432/creatorbot?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222

  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.0
    restart: unless-stopped
    volumes:
      - ./deploy/loki/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:10.3.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  botpay_data:
  prometheus_data:
  grafana_data:
  loki_data:
