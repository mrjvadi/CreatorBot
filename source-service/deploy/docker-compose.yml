version: "3.9"
services:
  # Two example worker instances. Copy the "worker-1" block to add more —
  # each just needs its own LICENSE_KEY (from botmanager). Sessions are
  # stored encrypted in Postgres (not a file), so these don't need a volume
  # and survive the container being recreated.
  worker-1:
    build:
      context: ../..
      dockerfile: source-service/deploy/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      LICENSE_KEY: ${WORKER_1_LICENSE_KEY}
    depends_on: [postgres, redis, nats]

  worker-2:
    build:
      context: ../..
      dockerfile: source-service/deploy/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      LICENSE_KEY: ${WORKER_2_LICENSE_KEY}
    depends_on: [postgres, redis, nats]

  # One-off interactive login for testing/recovery: prompts for phone (or
  # pass --phone) and the Telegram code, then saves the session. By default
  # it writes the same encrypted Postgres storage the workers use — run it
  # once per Telegram account before starting workers for that account, or
  # to recover after a lost session without waiting on botmanager:
  #   docker compose run --rm login --app-id 12345 --app-hash xxxx --phone +989120000000
  login:
    build:
      context: ../..
      dockerfile: source-service/deploy/Dockerfile
    entrypoint: ["/app/login"]
    env_file: ../.env
    stdin_open: true
    tty: true
    volumes: [sessions:/app/sessions] # only used if you pass --file
    depends_on: [postgres]
    profiles: ["tools"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sourceservice
      POSTGRES_USER: sourceservice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes: [pg_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis_data:/data]

  nats:
    image: nats:2-alpine
    restart: unless-stopped

volumes: {pg_data: {}, redis_data: {}, sessions: {}}
