apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: creatorbot-ingress
  namespace: creatorbot
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.yourdomain.com
    - webhook.yourdomain.com
    secretName: creatorbot-tls
  rules:
  - host: api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: apimanager
            port:
              number: 8080
  - host: webhook.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webhook-gateway
            port:
              number: 8090
