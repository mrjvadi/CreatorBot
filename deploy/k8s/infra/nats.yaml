apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: creatorbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        args:
        - -js
        - --user=$(NATS_USERNAME)
        - --pass=$(NATS_PASSWORD)
        env:
        - name: NATS_USERNAME
          valueFrom:
            configMapKeyRef:
              name: creatorbot-config
              key: NATS_USERNAME
        - name: NATS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: creatorbot-secrets
              key: NATS_PASSWORD
        ports:
        - containerPort: 4222
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: creatorbot
spec:
  selector:
    app: nats
  ports:
  - port: 4222
