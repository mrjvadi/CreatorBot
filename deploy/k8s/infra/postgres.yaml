apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: creatorbot
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: creatorbot
        - name: POSTGRES_USER
          value: botuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: creatorbot-secrets
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "botuser", "-d", "creatorbot"]
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: creatorbot
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
  clusterIP: None
