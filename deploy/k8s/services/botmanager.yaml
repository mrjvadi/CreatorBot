apiVersion: apps/v1
kind: Deployment
metadata:
  name: botmanager
  namespace: creatorbot
  labels:
    app: botmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: botmanager
  template:
    metadata:
      labels:
        app: botmanager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
      - name: botmanager
        image: creatorbot/botmanager:latest
        imagePullPolicy: Always
        env:
        - name: POSTGRES_DSN
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: POSTGRES_DSN}}
        - name: NATS_URL
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: NATS_URL}}
        - name: NATS_USERNAME
          valueFrom: {configMapKeyRef: {name: creatorbot-config, key: NATS_USERNAME}}
        - name: NATS_PASSWORD
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: NATS_PASSWORD}}
        - name: REDIS_ADDR
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: REDIS_ADDR}}
        - name: REDIS_PASSWORD
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: REDIS_PASSWORD}}
        - name: ENCRYPTION_KEY
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: ENCRYPTION_KEY}}
        - name: BOTMANAGER_TOKEN
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: BOTMANAGER_TOKEN}}
        - name: PLATFORM_TELEGRAM_ID
          valueFrom: {secretKeyRef: {name: creatorbot-secrets, key: PLATFORM_TELEGRAM_ID}}
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: botmanager
  namespace: creatorbot
spec:
  selector:
    app: botmanager
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
