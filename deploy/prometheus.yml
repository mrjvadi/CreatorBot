global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "botmanager"
    static_configs:
      - targets: ["botmanager:9100"]

  - job_name: "apimanager"
    static_configs:
      - targets: ["apimanager:9100"]

  - job_name: "agentmanager"
    static_configs:
      - targets: ["agentmanager:9100"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
