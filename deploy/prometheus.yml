global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'apimanager'
    static_configs:
      - targets: ['apimanager:9090']
    metrics_path: '/metrics'

  - job_name: 'botpay'
    static_configs:
      - targets: ['botpay:9091']

  - job_name: 'revenue-service'
    static_configs:
      - targets: ['revenue-service:9092']

  - job_name: 'agentmanager'
    static_configs:
      - targets: ['agentmanager:9093']

  - job_name: 'fraud-engine'
    static_configs:
      - targets: ['fraud-engine:9094']
