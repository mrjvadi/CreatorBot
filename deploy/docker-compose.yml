version: "3.9"

# ============================================================
# CreatorBot — Full Stack (NATS Architecture) — با Traefik/دامنه
# Run: docker compose --env-file .env up -d
#
# (۲۰۲۶-۰۷-۰۶) این فایل کامل شد: قبلاً همه‌ی سرویس‌های واقعی (بجز ۷ زیرساخت)
# کامنت بودند و ۱۰ سرویس جدیدتر (botpay, community-service, revenue-service,
# license-service, log-collector, image-registry, webhook-gateway,
# fraud-engine, docker-socket-proxy) اصلاً این‌جا نبودند. حالا با
# docker-compose.yml ریشه‌ی پروژه هم‌سطح است — تفاوت اصلی همین‌جا: این فایل
# Traefik/دامنه/TLS دارد، آن یکی برای dev محلی ساده‌تر است.
#
# ads-bot عمداً این‌جا نیست — هنوز هیچ Dockerfile ای ندارد (نه در ریشه، نه در
# deploy/)؛ طبق CLAUDE.md فعلاً با «go run cmd/*.go» دستی تست می‌شود، نه
# container. وقتی Dockerfile آن ساخته شد، این‌جا هم اضافه کنید.
# ============================================================

#x-build: &build
#  context: ..
#  args:
#    BUILDKIT_INLINE_CACHE: "1"

x-restart: &restart
  restart: unless-stopped

x-log: &log
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

networks:
  backend:
    driver: bridge
  web:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  nats_data:
  grafana_data:
  traefik_certs:
  sessions_data:
  botpay_data:
  image_registry_data:

services:

  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    <<: [*restart, *log]
    environment:
      # (۲۰۲۶-۰۷-۰۶) botmanager+apimanager عمداً همین یک DB مشترک را دارند
      # (رجوع کامنت بالای migrations/000_create_databases.sql). بقیه‌ی
      # سرویس‌ها هرکدام دیتابیس مخصوص خودشان را از همان پوشه‌ی migrations
      # می‌گیرند — این‌جا فقط دیتابیسِ پیش‌فرضِ اولِ کانتینر است.
      POSTGRES_DB: botmanager
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # قبلاً فقط ./init-db.sql (تک‌فایل، فقط ۵ ربات محصول) mount می‌شد. حالا
      # کل پوشه‌ی migrations (همان پوشه‌ای که docker-compose.yml ریشه‌ی پروژه
      # هم استفاده می‌کند) mount می‌شود — یعنی هم دیتابیس‌های سرویس‌های مرکزی
      # (000_create_databases.sql) هم دیتابیس‌های نوع‌های ربات محصول
      # (000_create_product_databases.sql) از یک منبع واحد ساخته می‌شوند.
      # deploy/init-db.sql دیگر استفاده نمی‌شود (رجوع کامنت بالای خودش).
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d botmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: [*restart, *log]
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6381}:6379"
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    <<: [*restart, *log]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-creatorbot}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    networks: [backend]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    <<: [*restart, *log]
    command: >
      -js
      -m 8222
      --user ${NATS_USERNAME:-nats}
      --pass ${NATS_PASSWORD:-nats_secret}
    ports:
      - "127.0.0.1:${NATS_PORT:-4222}:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.1
    <<: [*restart, *log]
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    ports:
      - "880:80"
      - "8443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    networks: [web]

  prometheus:
    image: prom/prometheus:latest
    <<: [*restart, *log]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    networks: [backend]

  grafana:
    image: grafana/grafana:latest
    <<: [*restart, *log]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [backend, web]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    depends_on:
      - prometheus

  # docker-socket-proxy: agentmanager فقط از طریق این پروکسی به docker.sock
  # دسترسی دارد — فقط endpointهای لازم (CONTAINERS, IMAGES) باز هستند؛
  # endpointهای حساس (EXEC, SWARM, PLUGINS, ...) بسته می‌مانند تا compromise
  # شدن agentmanager به root-equivalent روی host تبدیل نشود. رجوع
  # docker-compose.yml ریشه‌ی پروژه — همان تنظیمات، عیناً.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    <<: [*restart, *log]
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      EXEC: 0
      SWARM: 0
      PLUGINS: 0
      SYSTEM: 0
      NETWORKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [backend]

