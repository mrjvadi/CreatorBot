name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: '**/go.sum'
      - name: Check new formatting debt
        shell: bash
        run: |
          find . -name "*.go" -not -path "*/vendor/*" -print0 | xargs -0 gofmt -l | sort > /tmp/gofmt-current
          new_debt="$(comm -23 /tmp/gofmt-current .gofmt-baseline)"
          test -z "$new_debt" || { echo "$new_debt"; exit 1; }
      - name: Vet all modules
        shell: bash
        run: |
          while IFS= read -r mod; do
            (cd "$(dirname "$mod")" && go vet ./...)
          done < <(find . -name go.mod -not -path '*/vendor/*' | sort)
      - name: Test all modules
        run: ./scripts/test-all.sh
